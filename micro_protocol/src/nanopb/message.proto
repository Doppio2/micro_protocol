syntax = "proto3";

import "nanopb.proto";

message LightingOnCommand {
    uint32 channel = 1;
    uint32 brightness = 2;
}

enum ThrustersState {
    THRUSTERS_POWER_OFF = 0;
    THRUSTERS_POWER_ON = 1;
    THRUSTERS_NORMAL_OPERATION = 2;
    THRUSTERS_STOP = 3;
}

message ThrustersControl {
    ThrustersState state = 1; 
    uint32 configuration = 2; // кофигурация ДРК
    repeated int32 level = 3 [(nanopb).max_count = 8, (nanopb).fixed_count = true];
    //int16 th1_speed = 2; // -100%..100%
    //int16 th2_speed = 3; // -100%..100%
    //int16 th3_speed = 4; // -100%..100%
    //int16 th4_speed = 5; // -100%..100%
    //int16 th5_speed = 6; // -100%..100%
    //int16 th6_speed = 7; // -100%..100%
    //int16 th7_speed = 8; // -100%..100%
    //int16 th8_speed = 9; // -100%..100%
}

// Состояния работы модулей питания PAF
enum PAF_Status {
  PAF_NONE = 0;
  PAF_OK = 1;
  PAF_ERROR = 2;
}

message Telemetry {
    uint32 msg_id = 1;
    // Данные монитора питания системы (напряжение и ток)
    message PowerMonitor {
        float voltage = 1; // Напряжение
        float current = 2; // Ток
        PAF_Status paf_1 = 3;
        PAF_Status paf_2 = 4;
        PAF_Status paf_3 = 5;
        PAF_Status paf_4 = 6;
        PAF_Status paf_5 = 7;
    }
    PowerMonitor power_monitor = 2;
}